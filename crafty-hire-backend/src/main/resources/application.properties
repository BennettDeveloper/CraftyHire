spring.application.name=craftyhire

# ── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ── File Upload Limits ───────────────────────────────────────────────────────
# Allow resume uploads up to 10MB. Adjust for larger LaTeX/DOCX files if needed.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Database (H2 in-memory for demo) ────────────────────────────────────────
# H2 console available at http://localhost:8080/h2-console during development.
# To switch to PostgreSQL or MySQL in production:
#   1. Replace the h2 runtimeOnly dependency in build.gradle
#   2. Update the datasource URL, driver, and dialect below
spring.datasource.url=jdbc:h2:mem:craftyhire;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Claude (Anthropic) API ───────────────────────────────────────────────────
# Set your Anthropic API key via the ANTHROPIC_API_KEY environment variable.
# Never hardcode API keys in source files.
anthropic.api.key=${ANTHROPIC_API_KEY:your-api-key-here}
anthropic.api.base-url=https://api.anthropic.com
anthropic.api.version=2023-06-01
# Model to use for generation. Update to newer models as they become available.
anthropic.api.model=claude-haiku-4-5-20251001
# Maximum tokens in the Claude response (resumes + cover letters can be long)
anthropic.api.max-tokens=4096

# ── JWT ──────────────────────────────────────────────────────────────────────
# Override JWT_SECRET with a strong random secret in production.
# Access token expires in 15 minutes (900,000 ms).
# Refresh token expires in 7 days (604,800,000 ms).
jwt.secret=${JWT_SECRET:change-this-default-secret-in-production-use-256-bits}
jwt.access-token.expiration=900000
jwt.refresh-token.expiration=604800000

# ── CORS ─────────────────────────────────────────────────────────────────────
# The React dev server runs on port 3000 by default.
# Update this for staging/production frontend URLs.
cors.allowed-origins=http://localhost:5173,https://crafty-hire.vercel.app/

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.app.craftyhire=DEBUG
logging.level.org.springframework.security=INFO
